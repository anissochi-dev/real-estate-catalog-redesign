    <!-- Защита от принудительной перезагрузки Vite HMR при потере WS-соединения -->
    <script>
      (function() {
        var _nativeReload = window.location.reload.bind(window.location);
        var _lastAllowedReload = 0;
        var _pendingReloadTimer = null;

        Object.defineProperty(window.location, 'reload', {
          configurable: true,
          get: function() {
            return function(force) {
              var now = Date.now();
              // Vite вызывает reload при reconnect — подавляем если прошло < 60 сек
              if (now - _lastAllowedReload < 60000) {
                console.info('[HMR] reload подавлен — слишком частый вызов');
                return;
              }
              _lastAllowedReload = now;
              _nativeReload(force);
            };
          }
        });

        // Перехватываем Vite polling — он делает fetch('/@vite/client') и потом reload
        var _nativeFetch = window.fetch;
        window.fetch = function(input, init) {
          var url = typeof input === 'string' ? input : (input instanceof Request ? input.url : String(input));
          // Если Vite пытается "проверить" сервер после потери соединения — не даём reload произойти
          if (url && (url.includes('/@vite/') || url.includes('__vite_ping'))) {
            return _nativeFetch.apply(this, arguments).catch(function(e) {
              // Подавляем ошибку — пусть Vite продолжает polling без reload
              return new Response('', { status: 200 });
            });
          }
          return _nativeFetch.apply(this, arguments);
        };
      })();
    </script>

    <!-- Защита контента -->
    <script>
      (function() {
        // 1. Блокируем ПКМ на изображениях
        document.addEventListener('contextmenu', function(e) {
          if (e.target && (e.target.tagName === 'IMG' || e.target.closest?.('img'))) {
            e.preventDefault();
            return false;
          }
        }, true);

        // 2. Блокируем drag изображений
        document.addEventListener('dragstart', function(e) {
          if (e.target && e.target.tagName === 'IMG') {
            e.preventDefault();
            return false;
          }
        }, true);

        // 3. Блокируем копирование текста (Ctrl/Cmd+C) вне полей ввода
        document.addEventListener('copy', function(e) {
          var tag = document.activeElement && document.activeElement.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA') return;
          e.preventDefault();
          return false;
        }, true);

        // 4. Горячие клавиши: Ctrl+U (просмотр кода), Ctrl+S (сохранение), Ctrl+P (печать), F12
        document.addEventListener('keydown', function(e) {
          var ctrl = e.ctrlKey || e.metaKey;
          var tag = document.activeElement && document.activeElement.tagName;
          var inField = tag === 'INPUT' || tag === 'TEXTAREA';

          if (e.key === 'F12') { e.preventDefault(); return false; }
          if (ctrl && e.shiftKey && ['i','j','c','k'].indexOf(e.key.toLowerCase()) !== -1) {
            e.preventDefault(); return false;
          }
          if (ctrl && !inField && ['u','s','p'].indexOf(e.key.toLowerCase()) !== -1) {
            e.preventDefault(); return false;
          }
        }, true);

        // 5. Блокируем печать страницы
        window.addEventListener('beforeprint', function(e) {
          e.preventDefault();
          return false;
        });
      })();
    </script>
