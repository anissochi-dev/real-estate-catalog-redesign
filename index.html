    <!-- Early prefetch: 4 запроса стартуют параллельно с загрузкой JS-бандла.
         React читает window.__PREFETCH__ — если данные готовы, рендер без ожидания сети. -->
    <script>
      (function() {
        var BASE = 'https://functions.poehali.dev/590f7088-530b-4bfb-994e-1047674672fa';
        var CACHE_KEY = '__pf_v2__';
        var CACHE_TTL = 5 * 60 * 1000;

        // Мгновенное чтение из sessionStorage (предыдущее посещение)
        try {
          var raw = sessionStorage.getItem(CACHE_KEY);
          if (raw) {
            var cached = JSON.parse(raw);
            if (cached && Date.now() - cached.ts < CACHE_TTL) {
              window.__PREFETCH__ = cached.data;
            }
          }
        } catch(e) {}

        // fetch с таймаутом — зависший запрос не блокирует всю предзагрузку
        function pf(url) {
          var ac = new AbortController();
          var t = setTimeout(function(){ ac.abort(); }, 4000);
          return fetch(url, { signal: ac.signal })
            .then(function(r){ clearTimeout(t); return r.json(); })
            .catch(function(){ clearTimeout(t); return {}; });
        }

        // 3 параллельных запроса — стартуют пока браузер грузит JS-бандл
        window.__PREFETCH_PROMISE__ = Promise.all([
          pf(BASE + '?limit=8&offset=0'),
          pf(BASE + '?resource=public_settings'),
          pf(BASE + '?resource=public_home_data')
        ]).then(function(res) {
          var hd = res[2] || {};
          var data = {
            listings: (res[0].listings || []),
            total: (res[0].total || 0),
            settings: (res[1].settings || {}),
            stats: hd.stats || { total: 0, main_city: '', by_category: {}, by_deal: {} },
            leadsCount: (hd.leads_count || 0)
          };
          window.__PREFETCH__ = data;
          // Не кэшируем пустой результат (например при таймауте запроса) —
          // иначе следующий заход покажет пустую главную из кэша.
          var hasData = data.listings.length > 0;
          if (hasData) {
            try {
              // settings → в ключ который читает SettingsContext
              sessionStorage.setItem('bmn_settings_cache', JSON.stringify({ ts: Date.now(), data: data.settings }));
              // всё остальное
              sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data }));
            } catch(e) {}
          }
          if (typeof window.__PREFETCH_RESOLVE__ === 'function') {
            window.__PREFETCH_RESOLVE__(data);
          }
        }).catch(function(){});
      })();
    </script>

    <!-- HMR/fetch перехват ОТКЛЮЧЁН — раньше ломал нативный fetch. Vite сам справится. -->

    <!-- Авто-восстановление при ошибке загрузки модуля (устаревший кеш браузера после деплоя) -->
    <script>
      (function() {
        var RELOAD_KEY = '__chunk_reload_at__';
        var CLEAR_KEY = '__chunk_cache_cleared__';

        function isChunkError(msg) {
          msg = String(msg || '');
          return /Failed to fetch dynamically imported module|Loading chunk|ChunkLoadError|Importing a module script failed|error loading dynamically imported module/i.test(msg);
        }

        async function clearAllCaches() {
          try {
            if ('caches' in window) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function(k){ return caches.delete(k); }));
            }
          } catch(e) {}
          try {
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function(r){ return r.unregister(); }));
            }
          } catch(e) {}
        }

        function recover() {
          try {
            var last = Number(sessionStorage.getItem(RELOAD_KEY) || '0');
            if (Date.now() - last < 15000) return;
            sessionStorage.setItem(RELOAD_KEY, String(Date.now()));
          } catch(e) {}

          var alreadyCleared = false;
          try { alreadyCleared = sessionStorage.getItem(CLEAR_KEY) === '1'; } catch(e) {}

          if (!alreadyCleared) {
            try { sessionStorage.setItem(CLEAR_KEY, '1'); } catch(e) {}
            clearAllCaches().finally(function(){
              var url = new URL(window.location.href);
              url.searchParams.set('_cb', String(Date.now()));
              window.location.replace(url.toString());
            });
          } else {
            try { sessionStorage.removeItem(CLEAR_KEY); } catch(e) {}
            var url = new URL(window.location.href);
            url.searchParams.set('_cb', String(Date.now()));
            window.location.replace(url.toString());
          }
        }

        window.addEventListener('error', function(e) {
          if (isChunkError(e && (e.message || (e.error && e.error.message)))) recover();
        });
        window.addEventListener('unhandledrejection', function(e) {
          var reason = e && e.reason;
          var msg = reason && (reason.message || reason.toString && reason.toString());
          if (isChunkError(msg)) recover();
        });
      })();
    </script>

    <!-- SEO 404: для поисковых краулеров проверяем существование страницы.
         Если страница не найдена — заранее проставляем noindex в <head>,
         чтобы несуществующие URL не попадали в индекс (SPA отдаёт 200). -->
    <script>
      (function() {
        var ua = (navigator.userAgent || '').toLowerCase();
        var crawlers = ['googlebot','yandex','bingbot','mail.ru','duckduckbot','baiduspider','petalbot','semrush','ahrefsbot'];
        var isCrawler = crawlers.some(function(b){ return ua.indexOf(b) !== -1; });
        if (!isCrawler) return;
        var path = window.location.pathname;
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', 'https://functions.poehali.dev/1111ba70-a6c3-4c58-b8b0-2519af14b7ff?path=' + encodeURIComponent(path), false);
          xhr.send(null);
          if (xhr.status === 404) {
            var m = document.querySelector('meta[name="robots"]');
            if (!m) { m = document.createElement('meta'); m.setAttribute('name','robots'); document.head.appendChild(m); }
            m.setAttribute('content', 'noindex, nofollow');
          }
        } catch (e) {}
      })();
    </script>

    <!-- Лёгкая защита изображений: блокируем только ПКМ и перетаскивание картинок.
         Перехват F12/Ctrl+U/копирования/печати УБРАН — такое поведение
         антивирусы и браузеры помечают как вредоносное и портят репутацию сайта. -->
    <script>
      (function() {
        document.addEventListener('contextmenu', function(e) {
          if (e.target && (e.target.tagName === 'IMG' || (e.target.closest && e.target.closest('img')))) {
            e.preventDefault();
            return false;
          }
        }, true);
        document.addEventListener('dragstart', function(e) {
          if (e.target && e.target.tagName === 'IMG') {
            e.preventDefault();
            return false;
          }
        }, true);
      })();
    </script>

    <!-- 404-детектор: ставит prerender-status-code до загрузки React.
         Поисковики читают этот мета-тег и правильно квалифицируют ответ. -->
    <script>
      (function() {
        var p = window.location.pathname.replace(/\/+$/, '') || '/';
        var KNOWN = new Set(['/','/catalog','/map','/favorites','/compare',
          '/network-tenants','/news','/leads','/declined',
          '/catalog/office','/catalog/retail','/catalog/warehouse',
          '/catalog/restaurant','/catalog/hotel','/catalog/business',
          '/catalog/gab','/catalog/production','/catalog/land',
          '/catalog/building','/catalog/free_purpose','/catalog/car_service']);
        var PATTERNS = [/^\/object\/.+/,/^\/district\/.+/,/^\/news\/.+/];
        var known = KNOWN.has(p) || PATTERNS.some(function(r){ return r.test(p); });
        if (!known) {
          var m = document.createElement('meta');
          m.name = 'prerender-status-code';
          m.content = '404';
          document.head.appendChild(m);
          var r = document.createElement('meta');
          r.name = 'robots';
          r.content = 'noindex, nofollow';
          document.head.appendChild(r);
        }
      })();
    </script>
