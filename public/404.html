<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Загрузка...</title>
    <script>
      // SPA fallback: сохраняем путь и редиректим на index.html
      sessionStorage.setItem('spa_redirect', window.location.pathname + window.location.search + window.location.hash);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
